sonar.projectKey=yvezzz_Deployfast
sonar.organization=yvezzz
sonar.host.url=https://sonarcloud.io

# On indique à SonarCloud où trouver le code compilé (important pour Java)
sonar.java.binaries=target/classes

# Rapport de couverture JaCoCo (XML) - Requis pour SonarCloud
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# On peut exclure certains dossiers si nécessaire
sonar.exclusions=**/*.sql,**/*.xml